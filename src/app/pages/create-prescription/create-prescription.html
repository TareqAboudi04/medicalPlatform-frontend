<section class="prescription-page">
  <div class="prescription-card">
    <div class="page-header">
      <h1>Create Prescription</h1>
      <p>Add medicine and care instructions for this completed appointment</p>
    </div>

    <form [formGroup]="prescriptionForm" (ngSubmit)="onSubmit()" class="prescription-form">
      <div class="form-group">
        <label for="medicineName">Medicine name</label>
        <input id="medicineName" type="text" formControlName="medicineName" placeholder="Panadol" />

        <p class="validation-message" *ngIf="medicineName?.hasError('required') && (medicineName?.dirty || medicineName?.touched)">
          Medicine name is required.
        </p>
      </div>

      <div class="form-group">
        <label for="instructions">Instructions</label>
        <textarea
          id="instructions"
          rows="5"
          formControlName="instructions"
          placeholder="Take one tablet twice daily after meals."
        ></textarea>

        <p class="validation-message" *ngIf="instructions?.hasError('required') && (instructions?.dirty || instructions?.touched)">
          Instructions are required.
        </p>
      </div>

      <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>
      <p class="success-message" *ngIf="successMessage()">{{ successMessage() }}</p>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Creating...' : 'Create Prescription' }}
      </button>
    </form>
  </div>
</section>
